<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superleaf — Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --leaf-dark: #1a2e1a;
            --leaf-deep: #1e3a1e;
            --leaf-mid: #2d5a27;
            --leaf-bright: #4caf50;
            --leaf-accent: #a8e06c;
            --cream: #f4f1eb;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            background: var(--leaf-dark);
            color: var(--cream);
            overflow: hidden;
            position: relative;
        }

        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .floating-leaf {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
            opacity: 0.06;
            animation: floatLeaf 20s ease-in-out infinite;
        }

        .floating-leaf:nth-child(1) {
            background: var(--leaf-bright);
            top: -5%; left: 10%;
            animation-duration: 22s;
        }
        .floating-leaf:nth-child(2) {
            background: var(--leaf-accent);
            top: 60%; right: -5%;
            width: 300px; height: 300px;
            animation-delay: -5s;
            animation-duration: 26s;
        }
        .floating-leaf:nth-child(3) {
            background: var(--leaf-mid);
            bottom: -10%; left: 30%;
            width: 250px; height: 250px;
            animation-delay: -10s;
            animation-duration: 18s;
        }
        .floating-leaf:nth-child(4) {
            background: var(--leaf-accent);
            top: 20%; right: 20%;
            width: 150px; height: 150px;
            animation-delay: -7s;
            animation-duration: 24s;
        }

        @keyframes floatLeaf {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            25% { transform: translate(30px, -40px) rotate(15deg) scale(1.05); }
            50% { transform: translate(-20px, 20px) rotate(-10deg) scale(0.95); }
            75% { transform: translate(15px, 35px) rotate(8deg) scale(1.02); }
        }

        .grain {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 0.25;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 640px;
            animation: fadeUp 1.2s ease-out both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 180px;
            height: auto;
            margin-bottom: 2rem;
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3));
            animation: fadeUp 1s ease-out both;
        }

        .tagline {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            line-height: 1.3;
            margin-bottom: 1rem;
            animation: fadeUp 1s ease-out 0.15s both;
        }

        .tagline span {
            background: linear-gradient(135deg, var(--cream) 0%, var(--leaf-accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: clamp(0.85rem, 2vw, 1rem);
            font-weight: 300;
            color: rgba(244, 241, 235, 0.45);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
            animation: fadeUp 1s ease-out 0.3s both;
        }

        .divider {
            width: 48px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--leaf-accent), transparent);
            margin: 0 auto 2.5rem;
            animation: fadeUp 1s ease-out 0.35s both;
        }

        .message {
            font-size: 1.05rem;
            font-weight: 300;
            line-height: 1.8;
            color: rgba(244, 241, 235, 0.6);
            margin-bottom: 2.5rem;
            animation: fadeUp 1s ease-out 0.45s both;
        }

        .cta-link {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--leaf-dark);
            background: var(--leaf-accent);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.03em;
            padding: 0.85rem 2rem;
            border-radius: 100px;
            transition: all 0.4s ease;
            animation: fadeUp 1s ease-out 0.55s both;
        }

        .cta-link:hover {
            background: #bce882;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(168, 224, 108, 0.25);
        }

        .cta-link svg {
            width: 16px;
            height: 16px;
            transition: transform 0.3s ease;
        }

        .cta-link:hover svg {
            transform: translateX(3px);
        }

        .footer {
            position: fixed;
            bottom: 2rem;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 2;
            font-size: 0.75rem;
            color: rgba(244, 241, 235, 0.18);
            letter-spacing: 0.1em;
            animation: fadeUp 1s ease-out 0.8s both;
        }
    </style>
</head>

    </div>
